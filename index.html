<!DOCTYPE html>
<html>
  <head>
   <!-- The Game Logic Script -->
<script>
  AFRAME.registerComponent('play-audio-on-click', {
    init: function () {
      let el = this.el; // The specific object that got tapped
      
      el.addEventListener('click', function () {
        // Find the audio asset by its ID and play it
        let audio = document.querySelector('#history-audio');
        
        // Reset audio to the beginning in case the user taps it multiple times
        audio.currentTime = 0; 
        audio.play();
        
        console.log("Item tapped! Playing voiceover.");
      });
    }
  });
</script>
  </head>
<body style="margin: 0; overflow: hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-assets>
      <video id="my-video" src="animation.mp4" autoplay loop muted playsinline webkit-playsinline></video>
    </a-assets>

    <a-marker preset="hiro">
      <!-- The red box is gone, leaving only your video -->
      <a-video src="#my-video" width="0.9" height="1.6" position="0 0 0" rotation="-90 0 0"></a-video>
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
  
</body>
</html>
