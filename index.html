<!DOCTYPE html>
<html>
  <head>
   <!-- The Game Logic Script -->
<script>
  AFRAME.registerComponent('play-audio-on-click', {
    init: function () {
      let el = this.el; // The specific object that got tapped
      
      el.addEventListener('click', function () {
        // Find the audio asset by its ID and play it
        let audio = document.querySelector('#history-audio');
        
        // Reset audio to the beginning in case the user taps it multiple times
        audio.currentTime = 0; 
        audio.play();
        
        console.log("Item tapped! Playing voiceover.");
      });
    }
  });
</script>
  </head>
<body style="margin: 0; overflow: hidden;">
  
  <!-- STEP 2: The raycaster setup is injected right here into the scene -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
    
    <!-- Preload your audio file -->
    <a-assets>
      <!-- Ensure you upload your MP3 to GitHub and change 'your-voiceover.mp3' to match your actual file name -->
      <audio id="history-audio" src="your-voiceover.mp3" preload="auto"></audio>
    </a-assets>

    <a-marker preset="hiro">
      
      <!-- STEP 3: The interactive object. Notice the class and the play-audio-on-click command! -->
      <a-box position="0 0.5 0" material="color: blue;" class="clickable" play-audio-on-click></a-box>
      
    </a-marker>
    
    <a-entity camera></a-entity>
    
  </a-scene>
</body>
</html>
