<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- The Game Logic Script -->
    <script>
      AFRAME.registerComponent('play-audio-on-click', {
        init: function () {
          let el = this.el; // The specific object that got tapped
          
          el.addEventListener('click', function () {
            // Find the audio asset and play it
            let audio = document.querySelector('#history-audio');
            
            // Reset audio to start if they click it multiple times
            audio.currentTime = 0; 
            audio.play();
            
            console.log("Item tapped! Playing voiceover.");
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <!-- Added cursor='rayOrigin: mouse' to allow tapping on the mobile screen -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- Preload your assets here -->
      <a-assets>
        <audio id="history-audio" src="your-voiceover.mp3" preload="auto"></audio>
        <!-- <img id="freshener-image" src="vintage-freshener.png"> -->
      </a-assets>

      <!-- The AR Marker (Using Hiro for testing) -->
      <a-marker preset="hiro">
        
        <a-image src="Start.png" position="0 0.5 0" width="1" height="1" rotation="-90 0 0" class="clickable" play-audio-on-click></a-image>
        
      </a-marker>
      
      <!-- The camera -->
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
