<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <!-- Import A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- The Game Logic Script -->
    <script>
      AFRAME.registerComponent('play-audio-on-click', {
        init: function () {
          let el = this.el; // The Start button
          
          el.addEventListener('click', function () {
            // 1. Play the master voiceover audio
            let audio = document.querySelector('#history-audio');
            audio.currentTime = 0; 
            audio.play();
            
            // 2. Trigger the fade-out animation on the Start button
            el.emit('fadeOut');
            
            // 3. Remove 'clickable' so the invisible button doesn't block taps later
            el.classList.remove('clickable');
            
            console.log("Audio playing, Start button fading...");

            // 4. Wait 1 second (1000ms) for the fade to finish, then trigger Phase 1
            setTimeout(() => {
              el.setAttribute('visible', 'false'); // Hide the start button completely
              
              console.log("STARTING PHASE 1: Egypt");
              
              // Un-hide the Phase 1 container
              let phase1 = document.querySelector('#phase-1-egypt');
              phase1.setAttribute('visible', 'true');
              
              // Grab the Phase 1 video and explicitly tell it to play
              let phase1Vid = document.querySelector('#phase1-video');
              phase1Vid.currentTime = 0;
              phase1Vid.play();
              
            }, 1000);
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <!-- AR Scene with Mobile Tap Raycaster -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- Preload your assets here -->
      <a-assets>
        <!-- Master Voiceover -->
        <audio id="history-audio" src="your-voiceover.mp3" preload="auto"></audio>
        
        <!-- PHASE 1 ASSET: Transparent WebM Video -->
        <!-- "autoplay" is intentionally missing so it waits for the code -->
        <video id="phase1-video" src="egypt-animation.webm" preload="auto" muted playsinline webkit-playsinline></video>
      </a-assets>

      <!-- The AR Marker (Using Hiro for testing) -->
     <a-marker preset="hiro">
        
        <!-- THE START BUTTON -->
        <!-- Scaled horizontally (1.5 wide by 1 tall) -->
        <a-image id="start-btn" src="Start.png" position="0 0.5 0" width="1.5" height="1" rotation="-90 0 0" class="clickable" play-audio-on-click animation="property: components.material.material.opacity; to: 0; dur: 1000; startEvents: fadeOut"></a-image>
        
        <!-- PHASE 1: EGYPT (Hidden by default) -->
        <a-entity id="phase-1-egypt" visible="false">
            <!-- Scaled vertically for 1215x2160 (0.9 wide by 1.6 tall) -->
            <a-plane src="#phase1-video" position="0 0.5 0" rotation="-90 0 0" width="0.9" height="1.6" transparent="true"></a-plane>
        </a-entity>

      </a-marker>
      
      <!-- The camera -->
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
