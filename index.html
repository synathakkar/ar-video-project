<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // ----------------------------------------------------
      // COMPONENT 1: The Director (Handles Start -> Phase 1 -> Phase 2)
      // ----------------------------------------------------
      AFRAME.registerComponent('play-audio-on-click', {
        init: function () {
          let el = this.el; 
          
          el.addEventListener('click', function () {
            // 1. Play the master voiceover audio
            let audio = document.querySelector('#history-audio');
            audio.currentTime = 0; 
            audio.play();
            
            // 2. Fade out the Start button
            el.emit('fadeOut');
            el.classList.remove('clickable');
            
            console.log("Audio playing, Start button fading...");

            // 3. Wait for fade, then start Phase 1 (Egypt Video)
            setTimeout(() => {
              el.setAttribute('visible', 'false'); 
              console.log("STARTING PHASE 1: Egypt Video");
              
              document.querySelector('#phase-1-egypt').setAttribute('visible', 'true');
              let phase1Vid = document.querySelector('#phase1-video');
              phase1Vid.currentTime = 0;
              phase1Vid.play();
              
              // 4. Listen for Phase 1 to end, then trigger Phase 2
              phase1Vid.addEventListener('ended', function() {
                console.log("Phase 1 finished. Spawning Phase 2 Germs...");
                
                // Hide Video, Show Germs
                document.querySelector('#phase-1-egypt').setAttribute('visible', 'false');
                document.querySelector('#phase-2-germs').setAttribute('visible', 'true');
                
                // Activate germ colliders
                let germs = document.querySelectorAll('.germ');
                germs.forEach(g => g.classList.add('clickable'));
              });
              
            }, 1000);
          });
        }
      });

      // ----------------------------------------------------
      // COMPONENT 2: The Germ Logic (Handles Tapping & Animation)
      // ----------------------------------------------------
      let germsRemaining = 5; // Total germs on screen

      AFRAME.registerComponent('destroyable-germ', {
        init: function () {
          let el = this.el;
          
          el.addEventListener('click', function () {
            el.classList.remove('clickable'); // Prevent double taps

            // Play the destruction sound effect
            let popSound = document.querySelector('#pop-sound');
            popSound.currentTime = 0;
            popSound.play();

            // The 6 frames of your destruction animation
            let frames = ['#d1', '#d2', '#d3', '#d4', '#d5', '#d6'];
            let currentFrame = 0;

            // Swap images rapidly to create an animation (100ms per frame)
            let animInterval = setInterval(() => {
              if (currentFrame < frames.length) {
                el.setAttribute('src', frames[currentFrame]);
                currentFrame++;
              } else {
                // Animation finished: clear timer, hide germ, check game state
                clearInterval(animInterval);
                el.setAttribute('visible', 'false');
                germsRemaining--;
                console.log("Germ destroyed! Remaining: " + germsRemaining);

                if (germsRemaining <= 0) {
                  console.log("Phase 2 Complete. Ready for Phase 3!");
                  document.querySelector('#phase-2-germs').setAttribute('visible', 'false');
                  // Phase 3 trigger will go here later
                }
              }
            }, 100); 
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- ================= ASSETS ================= -->
      <a-assets>
        <!-- Audio -->
        <audio id="history-audio" src="your-voiceover.mp3" preload="auto"></audio>
        <audio id="pop-sound" src="pop.mp3" preload="auto"></audio>
        
        <!-- Phase 1 Video -->
        <video id="phase1-video" src="egypt-animation.webm" preload="auto" muted playsinline webkit-playsinline></video>

        <!-- Phase 2 Images -->
        <img id="instruction-text" src="destroy-text.png">
        <img id="germ-idle" src="germ-idle.png">
        <img id="d1" src="destroy1.png">
        <img id="d2" src="destroy2.png">
        <img id="d3" src="destroy3.png">
        <img id="d4" src="destroy4.png">
        <img id="d5" src="destroy5.png">
        <img id="d6" src="destroy6.png">
      </a-assets>

      <a-marker preset="hiro">
        
        <!-- THE START BUTTON -->
        <a-image id="start-btn" src="Start.png" position="0 0.5 0" width="1.5" height="1" rotation="-90 0 0" class="clickable" play-audio-on-click animation="property: components.material.material.opacity; to: 0; dur: 1000; startEvents: fadeOut"></a-image>
        
        <!-- PHASE 1: EGYPT VIDEO (Hidden by default) -->
        <a-entity id="phase-1-egypt" visible="false">
            <a-plane src="#phase1-video" position="0 0.5 0" rotation="-90 0 0" width="0.9" height="1.6" transparent="true"></a-plane>
        </a-entity>

        <!-- PHASE 2: INTERACTIVE GERMS (Hidden by default) -->
      <!-- PHASE 2: INTERACTIVE GERMS (Hidden by default) -->
        <a-entity id="phase-2-germs" visible="false">
          
          <!-- Text at the top: Scaled up to be much larger and readable -->
          <!-- Moved slightly further back on the Z axis (-1.2) to make room -->
          <a-image src="#instruction-text" position="0 0.5 -1.2" width="3" height="1" rotation="-90 0 0"></a-image>

          <!-- 5 Germs: Sizes doubled (0.8) and spread out further to prevent overlap -->
          <a-image class="germ" destroyable-germ src="#germ-idle" position="-1.2 0.5 0.8" width="0.8" height="0.8" rotation="-90 0 0"></a-image>
          <a-image class="germ" destroyable-germ src="#germ-idle" position="1.2 0.5 0.8" width="0.8" height="0.8" rotation="-90 0 0"></a-image>
          <a-image class="germ" destroyable-germ src="#germ-idle" position="0 0.5 0" width="0.8" height="0.8" rotation="-90 0 0"></a-image>
          <a-image class="germ" destroyable-germ src="#germ-idle" position="-1.2 0.5 -0.5" width="0.8" height="0.8" rotation="-90 0 0"></a-image>
          <a-image class="germ" destroyable-germ src="#germ-idle" position="1.2 0.5 -0.5" width="0.8" height="0.8" rotation="-90 0 0"></a-image>
          
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
