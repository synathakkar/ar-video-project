<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // ----------------------------------------------------
      // COMPONENT 1: The Director (Handles Scene Transitions)
      // ----------------------------------------------------
      AFRAME.registerComponent('play-audio-on-click', {
        init: function () {
          let el = this.el; 
          let phase1Vid = document.querySelector('#phase1-video');

          // Fix: Bind the 'ended' event cleanly outside the click function
          phase1Vid.addEventListener('ended', function() {
            console.log("Phase 1 finished. Spawning Phase 2 and Grass...");
            
            // Hide Video, Reveal Environment and Germs
            document.querySelector('#phase-1-egypt').setAttribute('visible', 'false');
            document.querySelector('#shared-environment').setAttribute('visible', 'true');
            document.querySelector('#phase-2-germs').setAttribute('visible', 'true');
            
            // Activate hitboxes
            let hitboxes = document.querySelectorAll('.germ-hitbox');
            hitboxes.forEach(h => h.classList.add('clickable'));
          });
          
          el.addEventListener('click', function () {
            // 1. Play Audio immediately
            let audio = document.querySelector('#history-audio');
            audio.currentTime = 0; 
            audio.play();
            
            // 2. Play Video immediately to bypass browser security blocks!
            // It will play invisibly in the background for 1 second.
            phase1Vid.play();

            // 3. Trigger fade out on Start button
            el.emit('fadeOut');
            el.classList.remove('clickable');

            // 4. Wait for the fade to finish
            setTimeout(() => {
              el.setAttribute('visible', 'false'); // Hide button completely
              document.querySelector('#phase-1-egypt').setAttribute('visible', 'true'); // Show video
              
              // Rewind the playing video to the beginning right as it becomes visible
              phase1Vid.currentTime = 0; 
            }, 1000);
          });
        }
      });

      // ----------------------------------------------------
      // COMPONENT 2: The Hitbox Logic (Perfect Tapping)
      // ----------------------------------------------------
      let germsRemaining = 5; 

      AFRAME.registerComponent('destroyable-germ', {
        init: function () {
          let el = this.el; 
          
          el.addEventListener('click', function () {
            el.classList.remove('clickable'); // Prevent double taps

            let parent = el.parentNode;
            let visualEl = parent.querySelector('.germ-visual');

            let popSound = document.querySelector('#pop-sound');
            popSound.currentTime = 0;
            popSound.play();

            let frames = ['#d1', '#d2', '#d3', '#d4', '#d5', '#d6'];
            let currentFrame = 0;

            let animInterval = setInterval(() => {
              if (currentFrame < frames.length) {
                visualEl.setAttribute('src', frames[currentFrame]);
                currentFrame++;
              } else {
                clearInterval(animInterval);
                parent.setAttribute('visible', 'false'); 
                germsRemaining--;
                console.log("Germ destroyed! Remaining: " + germsRemaining);

                if (germsRemaining <= 0) {
                  console.log("Phase 2 Complete. Ready for Phase 3!");
                  document.querySelector('#phase-2-germs').setAttribute('visible', 'false');
                  // Phase 3 trigger logic will go here
                }
              }
            }, 100); 
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <a-assets>
        <audio id="history-audio" src="your-voiceover.mp3" preload="auto"></audio>
        <audio id="pop-sound" src="pop.mp3" preload="auto"></audio>
        
        <video id="phase1-video" src="egypt-animation.webm" preload="auto" muted playsinline webkit-playsinline></video>

        <img id="instruction-text" src="destroy-text.png">
        <img id="germ-idle" src="germ-idle.png">
        <img id="d1" src="destroy1.png">
        <img id="d2" src="destroy2.png">
        <img id="d3" src="destroy3.png">
        <img id="d4" src="destroy4.png">
        <img id="d5" src="destroy5.png">
        <img id="d6" src="destroy6.png">
        
        <img id="grass-front" src="grass1.png">
        <img id="grass-back" src="grass2.png">
      </a-assets>

      <a-marker preset="hiro">
        
        <!-- THE START BUTTON -->
        <a-image id="start-btn" src="Start.png" position="0 0.5 0" width="1.5" height="1" rotation="-90 0 0" class="clickable" play-audio-on-click animation="property: components.material.material.opacity; to: 0; dur: 1000; startEvents: fadeOut"></a-image>
        
        <!-- PHASE 1: EGYPT VIDEO -->
        <a-entity id="phase-1-egypt" visible="false">
            <a-plane src="#phase1-video" position="0 0.5 0" rotation="-90 0 0" width="0.9" height="1.6" transparent="true"></a-plane>
        </a-entity>

        <!-- PERSISTENT ENVIRONMENT (Grass Background) -->
        <a-entity id="shared-environment" visible="false">
          <a-image src="#grass-back" position="0 0.4 1.2" width="4" height="2" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
          <a-image src="#grass-front" position="0 0.5 1.5" width="4.5" height="2" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
        </a-entity>

        <!-- PHASE 2: GERMS & TEXT -->
        <a-entity id="phase-2-germs" visible="false">
          <a-image src="#instruction-text" position="0 0.6 0" width="2" height="3.55" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>

          <!-- GERM CLUSTERS -->
          <a-entity class="germ-cluster" position="-0.9 0.5 0.5">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" destroyable-germ width="0.6" height="0.1" depth="0.6" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="0.9 0.5 0.5">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" destroyable-germ width="0.6" height="0.1" depth="0.6" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="0 0.5 0">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" destroyable-germ width="0.6" height="0.1" depth="0.6" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="-0.9 0.5 -0.8">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" destroyable-germ width="0.6" height="0.1" depth="0.6" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="0.9 0.5 -0.8">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" destroyable-germ width="0.6" height="0.1" depth="0.6" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
