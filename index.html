<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // ----------------------------------------------------
      // COMPONENT 1: MASTER GAME MANAGER
      // This controls the flow of all phases globally
      // ----------------------------------------------------
      AFRAME.registerComponent('game-manager', {
        init: function () {
          // Grab all our elements
          let startBtn = document.querySelector('#start-btn');
          let videoPlane = document.querySelector('#phase-1-egypt');
          let video = document.querySelector('#phase1-video');
          let audio = document.querySelector('#history-audio');
          let phase2Container = document.querySelector('#phase-2-germs');
          let envContainer = document.querySelector('#shared-environment');
          
          let currentPhase = 0; // Tracks where we are

          // Make sure the video doesn't loop accidentally
          video.loop = false;

          // LISTEN FOR START BUTTON TAP
          startBtn.addEventListener('click', function () {
            if (currentPhase !== 0) return; // Prevent double taps
            currentPhase = 1;
            console.log("Start tapped. Unlocking media...");

            // 1. THE UNLOCK (Crucial for mobile!)
            audio.play();
            video.play();
            video.pause(); // Pause instantly so we don't miss the beginning

            // 2. FADE OUT THE BUTTON
            startBtn.emit('fadeOut');
            startBtn.classList.remove('clickable');

            // 3. WAIT 1 SECOND, THEN SHOW VIDEO
            setTimeout(() => {
              startBtn.setAttribute('visible', 'false'); // Hide button
              videoPlane.setAttribute('visible', 'true'); // Show video screen
              
              video.currentTime = 0; // Rewind
              video.play(); // Play safely!
              console.log("STARTING PHASE 1: Video Playing");
            }, 1000);
          });

          // LISTEN FOR PHASE 1 VIDEO TO FINISH
          video.addEventListener('ended', function() {
            if (currentPhase !== 1) return;
            currentPhase = 2;
            console.log("Phase 1 finished. Spawning Phase 2 and Grass...");
            
            // Hide Video
            videoPlane.setAttribute('visible', 'false');
            
            // Show Environment and Germs
            envContainer.setAttribute('visible', 'true');
            phase2Container.setAttribute('visible', 'true');
            
            // Activate the invisible hitboxes so the user can tap them
            let hitboxes = document.querySelectorAll('.germ-hitbox');
            hitboxes.forEach(h => h.classList.add('clickable'));
          });
        }
      });

      // ----------------------------------------------------
      // COMPONENT 2: THE GERM DESTRUCTION LOGIC
      // ----------------------------------------------------
      let germsRemaining = 5; 

      AFRAME.registerComponent('germ-logic', {
        init: function () {
          let el = this.el; // This is the invisible hitbox
          
          el.addEventListener('click', function () {
            if (!el.classList.contains('clickable')) return;
            el.classList.remove('clickable'); // Prevent double taps

            // Find the visual image that lives next to this hitbox
            let parent = el.parentNode;
            let visualEl = parent.querySelector('.germ-visual');

            // Play Pop Sound
            let popSound = document.querySelector('#pop-sound');
            popSound.currentTime = 0;
            popSound.play();

            // Setup Animation Frames
            let frames = ['#d1', '#d2', '#d3', '#d4', '#d5', '#d6'];
            let currentFrame = 0;

            // Play Animation
            let animInterval = setInterval(() => {
              if (currentFrame < frames.length) {
                visualEl.setAttribute('src', frames[currentFrame]);
                currentFrame++;
              } else {
                // Animation Done
                clearInterval(animInterval);
                parent.setAttribute('visible', 'false'); // Hide this germ cluster completely
                
                germsRemaining--;
                console.log("Germ destroyed! Remaining: " + germsRemaining);

                // Check if all germs are dead
                if (germsRemaining <= 0) {
                  console.log("Phase 2 Complete! Ready for Phase 3...");
                  document.querySelector('#phase-2-germs').setAttribute('visible', 'false');
                  
                  // Phase 3 trigger logic will go here
                }
              }
            }, 100); 
          });
        }
      });
    </script>
  </head>

  <!-- Notice the game-manager is now attached directly to the a-scene -->
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene game-manager embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <a-assets>
        <audio id="history-audio" src="your-voiceover.mp3" preload="auto"></audio>
        <audio id="pop-sound" src="pop.mp3" preload="auto"></audio>
        <video id="phase1-video" src="egypt-animation.webm" preload="auto" muted playsinline webkit-playsinline></video>

        <img id="instruction-text" src="destroy-text.png">
        <img id="germ-idle" src="germ-idle.png">
        <img id="d1" src="destroy1.png">
        <img id="d2" src="destroy2.png">
        <img id="d3" src="destroy3.png">
        <img id="d4" src="destroy4.png">
        <img id="d5" src="destroy5.png">
        <img id="d6" src="destroy6.png">
        
        <img id="grass-front" src="grass1.png">
        <img id="grass-back" src="grass2.png">
      </a-assets>

      <a-marker preset="hiro">
        
        <!-- START BUTTON -->
        <a-image id="start-btn" src="Start.png" position="0 0.5 0" width="1.5" height="1" rotation="-90 0 0" class="clickable" animation="property: components.material.material.opacity; to: 0; dur: 1000; startEvents: fadeOut"></a-image>
        
        <!-- PHASE 1: EGYPT VIDEO -->
        <a-entity id="phase-1-egypt" visible="false">
            <a-plane src="#phase1-video" position="0 0.5 0" rotation="-90 0 0" width="0.9" height="1.6" transparent="true"></a-plane>
        </a-entity>

        <!-- PERSISTENT ENVIRONMENT (Grass Background) -->
        <a-entity id="shared-environment" visible="false">
          <a-image src="#grass-back" position="0 0.4 1.2" width="4" height="2" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
          <a-image src="#grass-front" position="0 0.5 1.5" width="4.5" height="2" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
        </a-entity>

        <!-- PHASE 2: GERMS & TEXT -->
        <a-entity id="phase-2-germs" visible="false">
          <a-image src="#instruction-text" position="0 0.6 0" width="2" height="3.55" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>

          <!-- GERM CLUSTERS (Visuals + Invisible Hitboxes) -->
          <!-- We attach germ-logic solely to the invisible hitboxes now -->
          <a-entity class="germ-cluster" position="-0.9 0.5 0.5">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" germ-logic width="1.5" height="0.5" depth="2.5" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="0.9 0.5 0.5">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" germ-logic width="1.5" height="0.5" depth="2.5" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="0 0.5 0">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" germ-logic width="1.5" height="0.5" depth="2.5" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="-0.9 0.5 -0.8">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" germ-logic width="1.5" height="0.5" depth="2.5" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
          
          <a-entity class="germ-cluster" position="0.9 0.5 -0.8">
            <a-image class="germ-visual" src="#germ-idle" width="1.2" height="2.1" rotation="-90 0 0" material="alphaTest: 0.5"></a-image>
            <a-box class="germ-hitbox" germ-logic width="1.5" height="0.5" depth="2.5" material="opacity: 0; transparent: true"></a-box>
          </a-entity>
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
