<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <!-- Import A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <!-- Initialize the AR Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- 1. Preload your video asset -->
      <a-assets>
        <!-- playsinline prevents iOS from forcing the video fullscreen -->
        <video id="my-video" src="animation.mp4" autoplay loop muted playsinline webkit-playsinline></video>
      </a-assets>

      <!-- 2. Define your custom marker -->
      <!-- Make sure this URL matches your .patt file name exactly -->
      <a-marker type="pattern" url="marker.patt">
        
        <!-- 3. Display the video -->
        <!-- rotation="-90 0 0" makes the video lie flat on top of your physical marker -->
        <a-video src="#my-video" width="1.6" height="0.9" position="0 0 0" rotation="-90 0 0"></a-video>
        
      </a-marker>
      
      <!-- The camera -->
      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
