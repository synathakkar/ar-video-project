<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <!-- Import A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
<body style="margin: 0; overflow: hidden;">
  
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-assets>
      <video id="my-video" src="animation.mp4" autoplay loop muted playsinline webkit-playsinline></video>
    </a-assets>

    <!-- Swapped your custom marker for the default Hiro marker -->
    <a-marker preset="hiro">
      
      <a-box position="0 0.5 0" material="color: red;"></a-box>
      <a-video src="#my-video" width="0.9" height="1.6" position="0 0 0" rotation="-90 0 0"></a-video>
      
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>
  
</body>
</html>
